{% extends 'store/base.html' %}

{% block title %}Report Customer{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width:980px; margin:1.5rem auto;">
  <div class="card" style="border:none; box-shadow:0 8px 24px rgba(0,0,0,.08); border-radius:14px; overflow:hidden;">
    <div class="card-header" style="background:#1f2937; color:#fff;">
      <h4 class="mb-0">Report a Customer</h4>
    </div>
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Reported User</label>
          <select name="reported_user" class="form-select" required>
            <option value="">Select customer</option>
            {% for target_user in target_users %}
            <option value="{{ target_user.id }}">{{ target_user.username }}{% if target_user.email %} ({{ target_user.email }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Issue Category</label>
          <select name="category" class="form-select" required>
            <option value="">Select category</option>
            {% for value,label in report_categories %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" rows="5" class="form-control" required placeholder="Describe abusive behavior, fake orders, payment problems, etc."></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Attachment (optional)</label>
          <input type="file" name="attachment" class="form-control">
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-primary" type="submit">Submit Report</button>
          <a class="btn btn-outline-secondary" href="{% url 'my_issue_reports' %}">View My Reports</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
